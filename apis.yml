---
aid: hkust
name: Hong Kong University of Science and Technology
description: >-
  The Hong Kong University of Science and Technology (HKUST) is a public research
  university in Clear Water Bay, Hong Kong SAR, ranked #82 in the QS World University
  Rankings 2025. HKUST operates a real developer footprint: an Azure API Management
  developer portal and API Gateway run by its Information Technology Services Office
  (ITSO) for departments to publish and consume internal application APIs, an Open
  Data Platform built on the Elastic Stack for smart-campus data, and DataSpace@HKUST,
  a Dataverse 6.1 research data repository with a public Native API. Most API access
  is gated behind institutional affiliation, sign-up, and a data access request
  process rather than being open self-service.
type: Index
position: Consumer
access: 3rd-Party
