modified: '2026-06-03'
specificationVersion: '0.19'
apis:
  - aid: hkust:developer-portal
    name: HKUST API Portal & Gateway
    description: >-
      Centralized HKUST API platform run by the IT Services Office on Azure API
      Management. Departments publish application APIs to the portal, where users
      can discover APIs, read documentation, try them interactively, and sign up
      to acquire keys. All API access is channeled through the HKUST API Gateway,
      which enforces access controls. Access generally requires HKUST affiliation
      and a data access request.
    humanURL: https://hkust.developer.azure-api.net/
    baseURL: https://api.ust.hk
    tags: [ API Gateway, Azure API Management, Developer Portal, Campus ]
    properties:
      - type: Documentation
        url: https://hkust.developer.azure-api.net/
      - type: SignUp
        url: https://hkust.developer.azure-api.net/signup
      - type: DeveloperPortal
        url: https://itso.hkust.edu.hk/services/it-infrastructure/api-gateway-api-portal
  - aid: hkust:dataspace
    name: DataSpace@HKUST Research Data Repository API
    description: >-
      DataSpace@HKUST is the institutional research data repository for the HKUST
      research community, hosted on Dataverse (version 6.1, confirmed live). It
      exposes the standard Dataverse Native REST API for searching, retrieving,
      and managing dataverses, datasets, and data files, with DOI-based persistent
      identifiers. Registered in the re3data directory of research data repositories.
    humanURL: https://dataspace.hkust.edu.hk/
    baseURL: https://dataspace.hkust.edu.hk/api
    tags: [ Research Data, Repository, Dataverse, Open Data, DOI ]
    properties:
      - type: Documentation
        url: https://guides.dataverse.org/en/latest/api/native-api.html
      - type: SourceCode
        url: https://github.com/IQSS/dataverse
  - aid: hkust:open-data-platform
    name: HKUST Open Data Platform
    description: >-
      Secure central data repository established by HKUST ITSO for collecting and
      sharing smart-campus data. Built on the Elastic Stack to ingest data from
      varied sources and formats and search, analyze, and visualize it in real
      time. Access is via the campus data access process rather than open
      self-service; no separate public API reference is published.
    humanURL: https://itso.hkust.edu.hk/services/it-infrastructure/smart-campus-infrastructure/open-data-platform
    tags: [ Open Data, Smart Campus, Elastic Stack, Analytics ]
    properties:
      - type: Documentation
        url: https://itso.hkust.edu.hk/services/it-infrastructure/smart-campus-infrastructure/open-data-platform
