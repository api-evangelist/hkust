    summary: >-
      HKUST has a genuine, named developer footprint: an Azure API Management
      developer portal and API Gateway operated by ITSO, an Elastic Stack Open
      Data Platform, and DataSpace@HKUST, a Dataverse 6.1 repository whose Native
      API was verified live (/api/info/version returned version 6.1). The
      developer portal, ITSO service pages, and official website all returned
      HTTP 200. However most access is gated behind HKUST affiliation, sign-up,
      and a data access request, and individual API specs are not openly listed,
      so the public self-service surface is limited. The DataSpace OAI-PMH
      endpoint returned 503. No public endpoints were fabricated; only verified
      properties are cataloged.
